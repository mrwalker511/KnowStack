name: PR Context

# Runs the KnowStack PR context minimizer on every pull request and posts a
# token-budgeted, LLM-ready review-context bundle as a PR comment. The comment
# is upserted (looked up by a hidden marker, then PATCH-ed or POST-ed) so
# successive pushes update the same comment instead of stacking new ones.
#
# This workflow is intentionally thin: all of the real work lives in the
# composite action at .github/actions/pr-context — the same path other repos
# reference as `mrwalker511/KnowStack/.github/actions/pr-context@main`. By
# dogfooding the same entry point, we guarantee external users get the
# behavior we exercise on every internal PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-context:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          # full history so `git diff <base>..HEAD` works
          fetch-depth: 0

      - name: Run KnowStack PR context
        uses: ./.github/actions/pr-context
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Self-test: install from this checkout rather than PyPI so a PR
          # that breaks the package is caught here. External callers should
          # leave `knowstack-spec` at its default (`knowstack`) to use PyPI.
          knowstack-spec: "."
          budget: "4000"
          model: claude-sonnet-4-6

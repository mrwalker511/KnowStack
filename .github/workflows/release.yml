name: release

# Publishes the `knowstack` package to PyPI on every `v*` tag push.
#
# Authentication uses PyPI Trusted Publishers (OIDC) — no API token in repo
# secrets. One-time setup on pypi.org:
#   1. Create the `knowstack` project.
#   2. Add a Pending Publisher pointing at
#        repository:   mrwalker511/KnowStack
#        workflow:     release.yml
#        environment:  pypi
#   3. On the first successful run, PyPI promotes the pending publisher.
#
# To publish a prerelease to TestPyPI instead, push a tag like `v0.1.0rc1`
# and the rc-suffix branch below targets test.pypi.org.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(python -c "import tomllib, sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $pkg_version" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/knowstack
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: ${{ !(contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b')) }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/knowstack
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
